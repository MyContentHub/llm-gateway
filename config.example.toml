# Server
port = 3000
host = "0.0.0.0"
log_level = "info"

# Database
database_path = "./data/gateway.db"

# Encryption key for storing upstream API keys (32 hex chars = 128-bit)
encryption_key = ""

# Rate limits
default_rpm = 60
default_tpm = 100000

# Providers
[[providers]]
name = "zhipuai"
baseUrl = "https://open.bigmodel.cn/api/paas/v4"
apiKey = "your-api-key"
isDefault = true

[providers.modelMappings]
glm-5 = "glm-5"

