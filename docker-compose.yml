services:
  gateway:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - gateway-data:/app/data
      - ./apps/gateway/config.toml:/app/config.toml:ro
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  gateway-data:
